<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIRGOHI21</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'GlowSans';
  src: url('GlowSansTC-Normal-Thin.otf') format('opentype');
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --orange: #c05a3c;
  --ink: #262422;
  --ink-60: rgba(38,36,34,.6);
  --ink-50: rgba(38,36,34,.5);
  --ink-45: rgba(38,36,34,.45);
  --ink-40: rgba(38,36,34,.4);
  --ink-14: rgba(38,36,34,.14);
  --ink-10: rgba(38,36,34,.1);
  --ink-06: rgba(38,36,34,.06);
  --bg: rgba(240,238,233,.35);
  --pill: 999px;
}
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: #ede9e2 url('Darkbackground.jpg') center 15% / cover fixed;
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button { font-family: 'Noto Sans TC', sans-serif; cursor: pointer; border: none; background: none; padding: 0; }
input, textarea { font-family: 'Noto Sans TC', sans-serif; }
.scroll::-webkit-scrollbar { display: none; }
.scroll { scrollbar-width: none; }

/* ══ 桌面版 ══ */
.desktop { display: none; height: 100vh; overflow: hidden; }
@media (min-width: 768px) {
  .desktop { display: grid; grid-template-columns: 240px 1fr; }
  .mobile  { display: none !important; }
}

/* 側欄 */
.sidebar {
  border-right: 1px solid var(--ink-10);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  background: rgba(240,238,233,.3);
  height: 100vh;
}
.s-logo {
  font-family: 'GlowSans','Noto Sans TC',sans-serif;
  font-weight: 900;
  font-size: 15px;
  letter-spacing: 3px;
  color: var(--ink);
  margin-bottom: 32px;
}
.s-cats { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.s-cat  { text-align: left; padding: 9px 0; font-size: 13px; color: var(--ink-60); transition: color .15s; }
.s-cat.active { font-weight: 700; color: var(--orange); }
.s-cat:hover:not(.active) { color: var(--ink); }
.s-post-btn {
  background: var(--orange);
  color: #fff;
  padding: 11px 0;
  border-radius: var(--pill);
  font-size: 12.5px;
  font-weight: 700;
  width: 100%;
  transition: opacity .15s;
}
.s-post-btn:hover { opacity: .85; }

/* 桌面主欄 */
.d-main { display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }
.d-topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 40px 18px;
  gap: 24px;
}
.d-search {
  flex: 1;
  max-width: 360px;
  border: none;
  border-bottom: 1px solid rgba(38,36,34,.2);
  background: transparent;
  padding: 6px 2px;
  font-size: 13px;
  color: var(--ink);
  outline: none;
}
.d-search::placeholder { color: var(--ink-45); }
.d-feed   { flex: 1; overflow-y: auto; padding: 0 40px 40px; display: flex; justify-content: center; }
.d-feed-i { width: 100%; max-width: 640px; }
.d-detail { flex: 1; overflow-y: auto; padding: 8px 40px 60px; display: flex; justify-content: center; }
.d-detail-i { width: 100%; max-width: 640px; }

/* ══ 手機版 ══ */
.mobile { display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }
.m-topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 22px 14px;
  position: relative;
}
.m-logo {
  font-family: 'GlowSans','Noto Sans TC',sans-serif;
  font-weight: 900;
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--ink);
}
.m-search-wrap { flex-shrink: 0; padding: 0 22px 12px; }
.m-search-wrap input {
  width: 100%;
  border: none;
  border-bottom: 1px solid rgba(38,36,34,.25);
  background: transparent;
  padding: 6px 2px;
  font-size: 13px;
  color: var(--ink);
  outline: none;
}
.m-search-wrap input::placeholder { color: var(--ink-45); }
.m-cats {
  flex-shrink: 0;
  display: flex;
  gap: 16px;
  padding: 0 22px 14px;
  border-bottom: 1px solid var(--ink-10);
  overflow-x: auto;
  scrollbar-width: none;
}
.m-cats::-webkit-scrollbar { display: none; }
.m-cat {
  font-size: 11.5px;
  color: var(--ink-50);
  padding: 0 0 4px;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .15s;
}
.m-cat.active { font-weight: 700; color: var(--ink); border-bottom-color: var(--orange); }
.m-feed { flex: 1; overflow-y: auto; padding: 0 22px 90px; background: var(--bg); }
.m-detail { flex: 1; overflow-y: auto; padding: 8px 22px 90px; background: var(--bg); }
.m-fab {
  position: absolute;
  right: 22px; bottom: 24px;
  z-index: 3;
  background: var(--orange);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--pill);
  font-size: 12.5px;
  font-weight: 700;
  box-shadow: 0 8px 20px rgba(192,90,60,.4);
}
.m-fab:hover { opacity: .85; }
.m-reply-bar {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  z-index: 3;
  padding: 12px 22px;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--ink-10);
  display: flex;
  gap: 10px;
  align-items: center;
}
.m-reply-bar input {
  flex: 1;
  border: none;
  background: var(--ink-06);
  border-radius: var(--pill);
  padding: 10px 16px;
  font-size: 13px;
  color: var(--ink);
  outline: none;
}

/* ══ 文章列表 ══ */
.post-row {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  padding: 17px 0;
  border-bottom: 1px solid var(--ink-10);
  cursor: pointer;
}
.post-row:hover .p-title { color: var(--orange); }
.m-post-row {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  padding: 15px 0;
  border-bottom: 1px solid var(--ink-10);
  cursor: pointer;
}
.m-post-row:hover .p-title { color: var(--orange); }
.p-left { min-width: 0; }
.p-meta { font-size: 10.5px; font-weight: 600; letter-spacing: .5px; color: var(--ink-45); margin-bottom: 5px; }
.p-title { font-size: 15px; font-weight: 600; line-height: 1.4; color: var(--ink); transition: color .15s; margin-bottom: 4px; }
.p-preview { font-size: 12.5px; line-height: 1.6; color: var(--ink-50); display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.p-right { flex-shrink: 0; text-align: right; }
.p-time { font-size: 11px; color: var(--ink-40); }
.p-cmt  { font-size: 11px; color: var(--ink-40); margin-top: 5px; }

/* ══ 文章詳細頁 ══ */
.detail-wrap { padding-top: 8px; }
.back-btn { font-size: 12.5px; font-weight: 500; color: var(--ink-60); margin-bottom: 14px; display: inline-block; }
.back-btn:hover { color: var(--ink); }
.d-tag { font-size: 10.5px; font-weight: 600; letter-spacing: .5px; color: var(--ink-50); background: var(--ink-06); padding: 3px 9px; border-radius: var(--pill); }
.d-title { font-size: 22px; font-weight: 800; line-height: 1.5; color: var(--ink); margin: 14px 0 8px; }
.d-meta  { font-size: 12px; color: var(--ink-45); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.d-body  { font-size: 14px; line-height: 1.85; color: var(--ink); margin: 18px 0; }
.d-actions { display: flex; align-items: center; gap: 18px; padding: 14px 0; border-top: 1px solid var(--ink-10); border-bottom: 1px solid var(--ink-10); margin-bottom: 22px; }
.cmt-total { font-size: 12px; color: var(--ink-40); }
.cmts-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--ink-50); margin-bottom: 12px; }
.cmt-item { margin-bottom: 16px; }
.cmt-head { display: flex; align-items: center; gap: 0; flex-wrap: wrap; }
.cmt-author { font-size: 12.5px; font-weight: 600; color: var(--ink); }
.cmt-time   { font-size: 11px; font-weight: 400; color: var(--ink-40); margin-left: 6px; }
.cmt-at-btn { font-size: 11px; color: var(--ink-45); margin-left: 8px; }
.cmt-at-btn:hover { color: var(--orange); }
.cmt-del-btn { font-size: 11px; color: var(--ink-40); margin-left: 6px; }
.cmt-del-btn:hover { color: var(--orange); }
.cmt-text { font-size: 13px; line-height: 1.7; color: rgba(38,36,34,.75); margin-top: 5px; }
.mention  { color: var(--orange); font-weight: 600; }
.del-confirm { font-size: 11px; color: var(--orange); }
.del-yes { color: var(--orange); font-size: 11px; font-weight: 700; cursor: pointer; margin-left: 4px; border: none; background: none; }
.del-no  { color: var(--ink-50); font-size: 11px; cursor: pointer; margin-left: 4px; border: none; background: none; }

/* 桌面回覆列 */
.d-reply-row { display: flex; gap: 10px; align-items: center; margin-top: 26px; }
.d-reply-row input {
  flex: 1;
  border: none;
  background: var(--ink-06);
  border-radius: var(--pill);
  padding: 11px 18px;
  font-size: 13px;
  color: var(--ink);
  outline: none;
}

/* 送出按鈕 */
.send-btn {
  background: var(--orange);
  color: #fff;
  padding: 10px 18px;
  border-radius: var(--pill);
  font-size: 12px;
  font-weight: 600;
  transition: opacity .15s;
  flex-shrink: 0;
}
.send-btn:hover:not(:disabled) { opacity: .85; }
.send-btn:disabled { background: var(--ink-14); color: rgba(38,36,34,.35); cursor: default; }

/* ══ 發文 Modal ══ */
.overlay {
  position: fixed; inset: 0; z-index: 10;
  background: rgba(38,36,34,.4);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.compose-modal {
  width: 520px; max-width: 100%; max-height: 90vh;
  background: rgba(255,255,255,.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(0,0,0,.35);
  padding: 28px;
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.compose-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.compose-cancel { font-size: 12.5px; font-weight: 500; color: var(--ink-60); }
.compose-cancel:hover { color: var(--ink); }
.compose-lbl { font-size: 14px; font-weight: 700; color: var(--ink); }
.compose-ok {
  background: var(--orange); color: #fff;
  padding: 8px 18px; border-radius: var(--pill);
  font-size: 12.5px; font-weight: 700;
}
.compose-ok:hover:not(:disabled) { opacity: .85; }
.compose-ok:disabled { background: var(--ink-14); color: rgba(38,36,34,.35); cursor: default; }
.compose-cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.c-cat { border: 1px solid var(--ink-14); padding: 6px 14px; border-radius: var(--pill); font-size: 11.5px; font-weight: 500; color: rgba(38,36,34,.65); background: rgba(255,255,255,.5); transition: all .15s; }
.c-cat.active { background: var(--orange); color: #fff; border-color: var(--orange); font-weight: 600; }
.compose-title-i {
  width: 100%; border: none;
  border-bottom: 1px solid rgba(38,36,34,.2);
  background: transparent; padding: 8px 2px;
  font-size: 16px; font-weight: 700; color: var(--ink); outline: none; margin-bottom: 14px;
}
.compose-title-i::placeholder { color: rgba(38,36,34,.3); }
.compose-body-i {
  min-height: 160px; width: 100%; border: none;
  background: transparent; resize: none;
  font-size: 14px; line-height: 1.7; color: var(--ink); outline: none;
}
.compose-body-i::placeholder { color: rgba(38,36,34,.3); }
.compose-note { font-size: 11px; color: var(--ink-40); margin-top: 10px; }

/* 狀態 */
.empty   { padding: 60px 0; text-align: center; font-size: 13px; color: var(--ink-45); }
.loading { padding: 40px 0; text-align: center; font-size: 13px; color: var(--ink-45); }
</style>
</head>
<body>

<!-- 桌面版 -->
<div class="desktop" id="desktopView">
  <div class="sidebar">
    <div class="s-logo">VIRGOHI21</div>
    <div class="s-cats" id="sCats"></div>
    <button class="s-post-btn" onclick="openCompose()">發文</button>
  </div>
  <div class="d-main">
    <div class="d-topbar">
      <input class="d-search scroll" id="dSearch" placeholder="搜尋討論..." oninput="onSearch()">
    </div>
    <div class="d-feed scroll" id="dFeed">
      <div class="d-feed-i" id="dFeedI"><div class="loading">載入中…</div></div>
    </div>
    <div class="d-detail scroll" id="dDetail" style="display:none">
      <div class="d-detail-i" id="dDetailI"></div>
    </div>
  </div>
</div>

<!-- 手機版 -->
<div class="mobile" id="mobileView">
  <div class="m-topbar">
    <div class="m-logo">VIRGOHI21</div>
    <button style="font-size:12px;font-weight:500;color:var(--ink-60);letter-spacing:.5px" onclick="toggleSearch()">搜尋</button>
  </div>
  <div class="m-search-wrap" id="mSearchWrap" style="display:none">
    <input id="mSearch" placeholder="搜尋討論..." oninput="onSearch()">
  </div>
  <div class="m-cats" id="mCats"></div>
  <div class="m-feed scroll" id="mFeed"><div class="loading">載入中…</div></div>
  <div class="m-detail scroll" id="mDetail" style="display:none"><div id="mDetailI"></div></div>
  <button class="m-fab" id="mFab" onclick="openCompose()">發文</button>
  <div class="m-reply-bar" id="mReplyBar" style="display:none">
    <input id="mReplyI" placeholder="以匿名身份留言..."
      oninput="document.getElementById('mSend').disabled=!this.value.trim()">
    <button class="send-btn" id="mSend" onclick="sendReply('m')" disabled>送出</button>
  </div>
</div>

<!-- 發文 Modal -->
<div class="overlay" id="composeOverlay" style="display:none" onclick="if(event.target===this)closeCompose()">
  <div class="compose-modal">
    <div class="compose-hd">
      <button class="compose-cancel" onclick="closeCompose()">取消</button>
      <span class="compose-lbl">新增討論</span>
      <button class="compose-ok" id="cOk" onclick="submitPost()" disabled>發布</button>
    </div>
    <div class="compose-cats" id="cCats"></div>
    <input class="compose-title-i" id="cTitle" placeholder="下一個標題..." maxlength="50" oninput="checkCompose()">
    <textarea class="compose-body-i" id="cBody" placeholder="分享點什麼吧，以匿名身份發佈..." oninput="checkCompose()"></textarea>
    <div class="compose-note">發布後將以匿名編號顯示，無法回溯身份</div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqBEaCvBtipmcjlOTZJgNRBLpzZ7eQxnq0onIe7Bw-SsIb0vRuDPm9bBCsu_1lfA/exec';
const ALL_CATS     = ['全部','公告','創作','討論','綜合'];
const COMPOSE_CATS = ['綜合','創作','討論'];

let allPosts = [];
let curCat = '全部';
let query = '';
let curPostId = null;
let cCat = '綜合';
let searchOpen = false;

let anonId = localStorage.getItem('virgohi_anon');
if (!anonId) {
  anonId = '#' + Math.random().toString(36).slice(2,7).toUpperCase();
  localStorage.setItem('virgohi_anon', anonId);
}

function api(p) {
  return fetch(SCRIPT_URL + '?' + new URLSearchParams(p)).then(function(r){ return r.json(); });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hl(text) {
  return text.replace(/@(#[A-Z0-9a-z]+)/g, '<span class="mention">@$1</span>');
}

function fmt(iso) {
  var d = new Date(iso), now = new Date(), s = (now - d) / 1000;
  if (s < 60) return '剛剛';
  if (s < 3600) return Math.floor(s/60) + ' 分鐘前';
  if (s < 86400) return Math.floor(s/3600) + ' 小時前';
  return (d.getMonth()+1) + '/' + d.getDate();
}

function buildCats() {
  document.getElementById('sCats').innerHTML = ALL_CATS.map(function(c){
    return '<button class="s-cat' + (c===curCat?' active':'') + '" onclick="selectCat(\'' + c + '\')">' + c + '</button>';
  }).join('');
  document.getElementById('mCats').innerHTML = ALL_CATS.map(function(c){
    return '<button class="m-cat' + (c===curCat?' active':'') + '" onclick="selectCat(\'' + c + '\')">' + c + '</button>';
  }).join('');
}

function buildComposeCats() {
  document.getElementById('cCats').innerHTML = COMPOSE_CATS.map(function(c){
    return '<button class="c-cat' + (c===cCat?' active':'') + '" onclick="pickCat(\'' + c + '\')">' + c + '</button>';
  }).join('');
}

function selectCat(cat) {
  curCat = cat;
  query = '';
  document.getElementById('dSearch').value = '';
  var ms = document.getElementById('mSearch');
  if (ms) ms.value = '';
  buildCats();
  renderFeed();
}

function pickCat(cat) {
  cCat = cat;
  buildComposeCats();
}

function onSearch() {
  var d = document.getElementById('dSearch').value;
  var m = document.getElementById('mSearch') ? document.getElementById('mSearch').value : '';
  query = d || m;
  renderFeed();
}

function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('mSearchWrap').style.display = searchOpen ? 'block' : 'none';
}

function filtered() {
  var list = allPosts;
  if (curCat !== '全部') list = list.filter(function(p){ return p.category === curCat; });
  if (query) {
    var q = query.toLowerCase();
    list = list.filter(function(p){
      return (p.title||'').toLowerCase().indexOf(q) >= 0 || (p.content||'').toLowerCase().indexOf(q) >= 0;
    });
  }
  return list;
}

async function loadPosts() {
  var data = await api({action:'getPosts'});
  if (!data.success) return;
  allPosts = data.posts;
  renderFeed();
}

function rowHtml(p, mobile) {
  var cls = mobile ? 'm-post-row' : 'post-row';
  var preview = mobile ? '' : '<div class="p-preview">' + esc(p.content||'') + '</div>';
  return '<div class="' + cls + '" onclick="openPost(\'' + esc(p.id) + '\')">' +
    '<div class="p-left">' +
      '<div class="p-meta">' + esc(p.category) + ' · ' + esc(p.author) + '</div>' +
      '<div class="p-title">' + esc(p.title) + '</div>' +
      preview +
    '</div>' +
    '<div class="p-right">' +
      '<div class="p-time">' + fmt(p.timestamp) + '</div>' +
      '<div class="p-cmt">' + (p.replyCount||0) + ' 留言</div>' +
    '</div>' +
  '</div>';
}

function renderFeed() {
  var posts = filtered();
  var empty = '<div class="empty">沒有符合的討論</div>';
  document.getElementById('dFeedI').innerHTML = posts.length ? posts.map(function(p){ return rowHtml(p,false); }).join('') : empty;
  document.getElementById('mFeed').innerHTML  = posts.length ? posts.map(function(p){ return rowHtml(p,true);  }).join('') : empty;
}

function cmtHtml(r) {
  return '<div class="cmt-item" id="cmt_' + r.id + '">' +
    '<div class="cmt-head">' +
      '<span class="cmt-author">' + esc(r.author) + '</span>' +
      '<span class="cmt-time">' + fmt(r.timestamp) + '</span>' +
      '<button class="cmt-at-btn" onclick="doMention(\'' + esc(r.author) + '\')">＠</button>' +
      '<button class="cmt-del-btn" onclick="askDelReply(\'' + esc(r.id) + '\')">刪除</button>' +
    '</div>' +
    '<div class="cmt-text">' + hl(esc(r.content)) + '</div>' +
  '</div>';
}

function detailHtml(post, replies, pfx) {
  var rHtml = replies.length ? replies.map(cmtHtml).join('') : '<div class="empty" style="padding:20px 0">還沒有留言</div>';
  return '<div class="detail-wrap">' +
    '<button class="back-btn" onclick="closeDetail()">← 返回</button>' +
    '<div style="margin-bottom:6px"><span class="d-tag">' + esc(post.category) + '</span></div>' +
    '<div class="d-title">' + esc(post.title) + '</div>' +
    '<div class="d-meta">' +
      '<span>' + esc(post.author) + ' · ' + fmt(post.timestamp) + '</span>' +
      '<button class="cmt-del-btn" id="' + pfx + '_delPost" onclick="askDelPost(\'' + esc(post.id) + '\',\'' + pfx + '\')">刪除文章</button>' +
    '</div>' +
    '<div class="d-body">' + esc(post.content||'') + '</div>' +
    '<div class="d-actions"><span class="cmt-total">' + replies.length + ' 則留言</span></div>' +
    '<div class="cmts-label">留言</div>' +
    '<div id="' + pfx + '_cmts">' + rHtml + '</div>' +
    '<div class="d-reply-row">' +
      '<input id="' + pfx + '_ri" placeholder="以匿名身份留言..." oninput="document.getElementById(\'' + pfx + '_send\').disabled=!this.value.trim()">' +
      '<button class="send-btn" id="' + pfx + '_send" onclick="sendReply(\'' + pfx + '\')" disabled>送出</button>' +
    '</div>' +
  '</div>';
}

async function openPost(id) {
  curPostId = id;
  showDetail(true);
  var data = await api({action:'getPost', id:id});
  if (!data.success) { showDetail(false); return; }
  document.getElementById('dDetailI').innerHTML = detailHtml(data.post, data.replies, 'd');
  document.getElementById('mDetailI').innerHTML = detailHtml(data.post, data.replies, 'm');
  document.getElementById('mReplyBar').style.display = 'flex';
  document.getElementById('mFab').style.display = 'none';
  document.getElementById('mReplyI').oninput = function(){
    document.getElementById('mSend').disabled = !this.value.trim();
  };
}

function showDetail(show) {
  document.getElementById('dFeed').style.display   = show ? 'none' : 'flex';
  document.getElementById('dDetail').style.display = show ? 'flex' : 'none';
  document.getElementById('mFeed').style.display   = show ? 'none' : 'block';
  document.getElementById('mDetail').style.display = show ? 'block' : 'none';
  document.getElementById('mFab').style.display    = show ? 'none' : 'block';
  document.getElementById('mReplyBar').style.display = 'none';
  if (!show) {
    document.getElementById('dDetailI').innerHTML = '';
    document.getElementById('mDetailI').innerHTML = '';
  }
}

function closeDetail() {
  curPostId = null;
  showDetail(false);
  loadPosts();
}

async function refreshCmts() {
  if (!curPostId) return;
  var data = await api({action:'getPost', id:curPostId});
  if (!data.success) return;
  var html = data.replies.length ? data.replies.map(cmtHtml).join('') : '<div class="empty" style="padding:20px 0">還沒有留言</div>';
  var dC = document.getElementById('d_cmts');
  var mC = document.getElementById('m_cmts');
  if (dC) dC.innerHTML = html;
  if (mC) mC.innerHTML = html;
}

async function sendReply(pfx) {
  var input = document.getElementById(pfx + '_ri');
  if (!input) return;
  var content = input.value.trim();
  if (!content || !curPostId) return;
  var data = await api({action:'addReply', postId:curPostId, author:anonId, content:content});
  if (!data.success) return;
  input.value = '';
  var send = document.getElementById(pfx + '_send');
  if (send) send.disabled = true;
  await refreshCmts();
}

function doMention(author) {
  var tag = '@' + author + ' ';
  var dDetail = document.getElementById('dDetail');
  var isDesktop = dDetail && dDetail.style.display !== 'none';
  var pfx = isDesktop ? 'd' : 'm';
  var input = document.getElementById(pfx + '_ri') || document.getElementById('mReplyI');
  var sendId = isDesktop ? 'd_send' : 'mSend';
  if (!input) return;
  var pos = input.selectionStart !== undefined ? input.selectionStart : input.value.length;
  input.value = input.value.slice(0,pos) + tag + input.value.slice(pos);
  input.focus();
  input.selectionStart = input.selectionEnd = pos + tag.length;
  var send = document.getElementById(sendId);
  if (send) send.disabled = !input.value.trim();
}

function askDelPost(id, pfx) {
  var el = document.getElementById(pfx + '_delPost');
  if (!el) return;
  el.outerHTML = '<span class="del-confirm">確定刪除？' +
    '<button class="del-yes" onclick="doDelPost(\'' + id + '\')">刪除</button>' +
    '<button class="del-no" onclick="openPost(\'' + id + '\')">取消</button>' +
    '</span>';
}

async function doDelPost(id) {
  await api({action:'deletePost', id:id});
  closeDetail();
}

function askDelReply(id) {
  var el = document.querySelector('[onclick="askDelReply(\'' + id + '\')"]');
  if (!el) return;
  el.outerHTML = '<span class="del-confirm" id="dc_' + id + '">確定？' +
    '<button class="del-yes" onclick="doDelReply(\'' + id + '\')">刪除</button>' +
    '<button class="del-no" onclick="cancelDelReply(\'' + id + '\')">取消</button>' +
    '</span>';
}

function cancelDelReply(id) {
  var el = document.getElementById('dc_' + id);
  if (el) el.outerHTML = '<button class="cmt-del-btn" onclick="askDelReply(\'' + id + '\')">刪除</button>';
}

async function doDelReply(id) {
  await api({action:'deleteReply', id:id});
  var el = document.getElementById('cmt_' + id);
  if (el) el.remove();
}

function openCompose() {
  cCat = '綜合';
  document.getElementById('cTitle').value = '';
  document.getElementById('cBody').value = '';
  document.getElementById('cOk').disabled = true;
  buildComposeCats();
  document.getElementById('composeOverlay').style.display = 'flex';
}

function closeCompose() {
  document.getElementById('composeOverlay').style.display = 'none';
}

function checkCompose() {
  var t = document.getElementById('cTitle').value.trim();
  var b = document.getElementById('cBody').value.trim();
  document.getElementById('cOk').disabled = !(t && b);
}

async function submitPost() {
  var title   = document.getElementById('cTitle').value.trim();
  var content = document.getElementById('cBody').value.trim();
  if (!title || !content) return;
  var btn = document.getElementById('cOk');
  btn.disabled = true; btn.textContent = '發布中…';
  var data = await api({action:'addPost', author:anonId, title:title, content:content, category:cCat, tags:''});
  btn.textContent = '發布';
  if (data.success) { closeCompose(); await loadPosts(); }
  else btn.disabled = false;
}

buildCats();
loadPosts();
</script>
